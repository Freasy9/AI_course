# 推送到 main 或手动运行时：构建并发布到 GitHub Pages
# 仓库 Settings → Pages → Source 选「GitHub Actions」
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6 起官方 action 使用 Node 24，消除 Node 20 弃用告警
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      # @teachablemachine/image 要求 tfjs@1.3.1，但项目用 tfjs@4.22.0；本地可能用 --legacy-peer-deps 安装
      - run: npm ci --legacy-peer-deps
      # 在线地址：https://freasy9.github.io/AI_course/  → base 必须为 /AI_course/
      # COSTAR 创作工坊 API：在仓库 Settings → Secrets and variables → Actions 添加：
      #   VITE_XAI_API_KEY（xAI API 密钥，用于文本/图片生成）
      #   或 VITE_MAGIC_SPELL_API_BASE（自建后端地址，如 https://api.example.com）
      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # 从 GitHub Secrets 读取环境变量，Vite 会在构建时注入到代码中
          VITE_XAI_API_KEY: ${{ secrets.VITE_XAI_API_KEY }}
          VITE_XAI_BASE_URL: ${{ secrets.VITE_XAI_BASE_URL }}
          VITE_MAGIC_SPELL_PROVIDER: ${{ secrets.VITE_MAGIC_SPELL_PROVIDER }}
          VITE_MAGIC_SPELL_API_BASE: ${{ secrets.VITE_MAGIC_SPELL_API_BASE }}
        run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
