# 推送到 main 或手动运行时：构建并发布到 GitHub Pages
# 仓库 Settings → Pages → Source 选「GitHub Actions」
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# GitHub 逐步弃用 Actions 内置 Node 20；提前使用 Node 24 运行官方 action，消除告警
# 参考: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # 在线地址：https://freasy9.github.io/AI_course/  → base 必须为 /AI_course/
      - name: Build
        env:
          # Vite + TensorFlow 打包体积大，避免 CI 内存不足 exit 1
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
